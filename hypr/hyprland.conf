# ~/.config/hypr/hyprland.conf

$mainMod = SUPER
$terminal = alacritty
$menu = rofi -show drun -show-icons
$fileManager = thunar
source = /home/utsuro/.config/hypr/theme/current.conf

monitor = HDMI-A-1, preferred, 0x0, 1
monitor = eDP-1, preferred, 0x1080, 1

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

general {
    layout = dwindle
    border_size = 2
    gaps_in = 0
    gaps_out = 0
    col.active_border = $theme_hypr_active_border
    col.inactive_border = $theme_hypr_inactive_border
    resize_on_border = true
}

decoration {
    rounding = 0

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

dwindle {
    preserve_split = true
    pseudotile = true
    smart_split = false
    smart_resizing = false
}

group {
    auto_group = true
    group_on_movetoworkspace = true
    insert_after_current = true
    focus_removed_window = true
    col.border_active = $theme_hypr_active_border
    col.border_inactive = $theme_hypr_group_inactive
    col.border_locked_active = $theme_hypr_active_border
    col.border_locked_inactive = $theme_hypr_inactive_border

    groupbar {
        enabled = true
        font_family = $theme_font_mono
        font_size = $theme_font_groupbar_size
        gradients = false
        height = 18
        render_titles = true
        scrolling = true
        text_color = $theme_hypr_group_text
        col.active = $theme_hypr_active_border
        col.inactive = $theme_hypr_inactive_border
        col.locked_active = $theme_hypr_active_border
        col.locked_inactive = $theme_hypr_inactive_border
    }
}

binds {
    movefocus_cycles_groupfirst = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

input {
    kb_model = pc105
    kb_layout = us,ru
    kb_options = grp:win_space_toggle
    resolve_binds_by_sym = false
    follow_mouse = 1
    sensitivity = 0
}

xwayland {
    force_zero_scaling = true
}

exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP HYPRLAND_INSTANCE_SIGNATURE QT_QPA_PLATFORMTHEME
exec-once = systemctl --user restart lan-mouse.service
exec-once = hyprpaper
exec-once = xsettingsd
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = playerctld daemon
exec-once = waybar -c ~/.config/hypr/waybar.jsonc -s ~/.config/hypr/waybar.css

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, X, exec, $fileManager
bind = $mainMod CTRL, L, exec, hyprlock --immediate-render --config /home/utsuro/.config/hypr/hyprlock.conf

bind = $mainMod SHIFT, Q, killactive
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod SHIFT, T, exec, /home/utsuro/.config/theme-switcher/theme-menu
bind = $mainMod SHIFT, F, exec, /home/utsuro/.config/theme-switcher/font-menu
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, space, togglefloating
bind = $mainMod, W, togglegroup
bind = $mainMod SHIFT, W, moveoutofgroup
bind = $mainMod, V, togglesplit
bind = $mainMod, P, pseudo
bind = $mainMod, Tab, cyclenext
bind = $mainMod SHIFT, Tab, cyclenext, prev
bind = $mainMod CTRL SHIFT, L, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL SHIFT, R, movecurrentworkspacetomonitor, r
bind = $mainMod CTRL SHIFT, Left, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL SHIFT, Right, movecurrentworkspacetomonitor, r

bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Down, movefocus, d
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Right, movefocus, r

bind = $mainMod SHIFT, H, movewindoworgroup, l
bind = $mainMod SHIFT, J, movewindoworgroup, d
bind = $mainMod SHIFT, K, movewindoworgroup, u
bind = $mainMod SHIFT, L, movewindoworgroup, r
bind = $mainMod SHIFT, Left, movewindoworgroup, l
bind = $mainMod SHIFT, Down, movewindoworgroup, d
bind = $mainMod SHIFT, Up, movewindoworgroup, u
bind = $mainMod SHIFT, Right, movewindoworgroup, r

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod, R, submap, resize

submap = resize
binde = , H, resizeactive, -40 0
binde = , J, resizeactive, 0 40
binde = , K, resizeactive, 0 -40
binde = , L, resizeactive, 40 0
binde = , Left, resizeactive, -40 0
binde = , Down, resizeactive, 0 40
binde = , Up, resizeactive, 0 -40
binde = , Right, resizeactive, 40 0
bind = , Escape, submap, reset
bind = , Return, submap, reset
submap = reset

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = $mainMod SHIFT, P, exec, playerctl previous
bind = $mainMod SHIFT, N, exec, playerctl next

bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

windowrule = match:class ^(com\\.spt\\.postlink\\.gui\\.Application)$, workspace 4 silent
windowrule = match:class ^(telegram-desktop)$, workspace 4 silent
windowrule = match:class ^(nekoray)$, workspace 9 silent
windowrule = match:class ^(pavucontrol)$, float on, center on
